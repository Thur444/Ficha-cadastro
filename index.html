<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de cadastro</title>
</head>
<body>
    <div class="topo">
        <div class="image">
            <img src="images/registro-online.png">
        </div>
        <div class="cadastro-topo">
            <h1>Ficha de cadastro de funcionário</h1>
            <p>Formulário para coleta de dados pessoais,documentos e informações necessárias para admissão e registro interno do colaborador</p>
        </div>
    </div>

    <div class="documentos-necessarios">
        <div class="imagem-documentos">
            <img src="images/registrado.png">
        </div>
    <div class="dados-left">
            <ul>
                <li>Documento de Identidade (RG)</li>
                <li>CPF</li>
                <li>Carteira de Trabalho (fisica ou digital)</li>
                <li>Comprovante de Residencia</li>
            </ul>
        </div>
        <div class="dados-right">
            <ul>
                <li>Titulo de eleitor</li>
            </ul>
        </div>
    </div>
</body>
</html>
